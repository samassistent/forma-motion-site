<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forma Motion — Crowdfunding</title>
  <meta name="description" content="Crowdfunding for Forma Motion: help build premium guided movement for healthy aging." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    :root {
      --bg: #ece4d9;
      --bg-deep: #ddcfbf;
      --surface: #f4ede4d9;
      --text: #171717;
      --muted: #5d5751;
      --line: #d2c1ad;
      --accent: #1f3a5b;
      --dark: #121212;
    }
    body.theme-night {
      --bg: #0f1729;
      --bg-deep: #131f38;
      --surface: #1a2742d9;
      --text: #e8edf8;
      --muted: #a9b4cb;
      --line: #2b3d61;
      --accent: #8fb2ff;
      --dark: #e8edf8;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(160deg,var(--bg),var(--bg-deep));
      min-height:100vh;
    }
    .container{max-width:980px;margin:0 auto;padding:30px 22px 70px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    .brand{font-family:Didot,"Bodoni MT","Times New Roman",serif;font-size:1.8rem}
    .toggle{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:999px;padding:8px 12px;cursor:pointer}
    .hero{
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--surface);
      padding:30px 24px;
      margin-bottom:20px;
    }
    h1{margin:0 0 8px;font-size:clamp(1.7rem,4vw,2.6rem)}
    .accent{color:var(--accent)}
    p{color:var(--muted);margin:0 0 14px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    .card{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:18px}
    .progress-wrap{margin:14px 0 8px}
    .progress-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px;font-size:.95rem}
    .bar{height:12px;border-radius:999px;background:color-mix(in srgb, var(--line) 55%, transparent 45%);overflow:hidden;border:1px solid var(--line)}
    .fill{height:100%;width:38%;background:linear-gradient(90deg,var(--accent),#7da1d6);box-shadow:0 0 14px rgba(61,104,170,.35)}
    .card h3{margin:0 0 8px}
    .btn{display:inline-block;text-decoration:none;padding:11px 15px;border-radius:999px;font-weight:600;border:1px solid var(--line)}
    .btn.primary{background:var(--dark);color:var(--bg)}
    .btn.secondary{color:var(--text);background:transparent}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .note{font-size:.86rem;color:var(--muted)}
    .levels{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
    .lvl{border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;background:color-mix(in srgb, var(--surface) 92%, transparent 8%)}
    .lvl strong{display:block;font-size:1.15rem}
    footer{margin-top:24px;color:var(--muted);font-size:.9rem}
    @media (max-width:860px){.grid,.levels{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="brand">Forma Motion</div>
      <button class="toggle" id="theme-toggle">☾</button>
    </div>

    <section class="hero">
      <h1>Crowdfunding the future of movement <span class="accent">for healthy aging</span>.</h1>
      <p>Funding product development, pilot testing, and first hardware prototypes.</p>
      <div class="row">
        <a class="btn primary" href="index.html">← Back to Website</a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h3>Crowdfunding via Stripe</h3>

        <div class="progress-wrap">
          <div class="progress-head">
            <strong>Goal</strong>
            <span>€19,200 / €50,000</span>
          </div>
          <div class="bar" aria-label="campaign progress">
            <div class="fill"></div>
          </div>
        </div>

        <div class="row">
          <a class="btn primary" href="https://buy.stripe.com/test_eVq7sEcHUdlV1v5etQejK00" id="fiat-link" target="_blank" rel="noopener">Back this project</a>
        </div>
      </article>
    </section>

    <footer>
      © 2026 Forma Motion · Crowdfunding page
    </footer>
  </div>

  <script>
    const key = 'forma_motion_theme';
    const toggle = document.getElementById('theme-toggle');
    function applyTheme(theme){
      const night = theme === 'night';
      document.body.classList.toggle('theme-night', night);
      toggle.textContent = night ? '☀' : '☾';
    }
    const saved = localStorage.getItem(key);
    if(saved){ applyTheme(saved); }
    else { const h=new Date().getHours(); applyTheme(h>=20||h<7?'night':'day'); }
    toggle.addEventListener('click', ()=>{
      const next = document.body.classList.contains('theme-night') ? 'day':'night';
      localStorage.setItem(key,next); applyTheme(next);
    });
  </script>
</body>
</html>
